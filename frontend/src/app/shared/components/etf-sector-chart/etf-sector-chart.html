<div
  class="relative w-full h-full bg-dark-800/40 border border-copper-500/20 rounded-2xl p-6 shadow-xl shadow-black/50 overflow-hidden group hover:border-copper-500/40 hover:bg-dark-800/60 transition-all duration-500 flex flex-col gap-5 min-h-full">
  <div
    class="absolute -top-16 -left-16 w-32 h-32 bg-copper-500/5 rounded-full blur-[40px] pointer-events-none group-hover:bg-copper-500/15 transition-all duration-700">
  </div>

  <h3
    class="text-copper-300 text-xs font-black uppercase tracking-[0.2em] pb-3 border-b border-copper-500/20 drop-shadow-sm flex items-center relative z-10 shrink-0">
    <span class="w-1.5 h-1.5 bg-copper-500 mr-2 rounded-sm shadow-[0_0_8px] shadow-copper-500/60"></span>
    Sector Exposure
  </h3>

  <div class="relative z-10 flex-grow w-full h-[220px] min-h-0">
    <canvas #chartCanvas [class.invisible]="!hasData()">
      <p class="sr-only">Donut chart showing ETF sector weights allocation.</p>
    </canvas>
    @if (!hasData()) {
      <app-chart-empty-state />
    }
  </div>
</div>
