<!-- Header Card (Titre de la page Asset) -->
<div
    class="w-full bg-dark-800/40 backdrop-blur-md border border-copper-500/30 rounded-2xl p-6 md:p-8 shadow-xl shadow-black/50 relative overflow-hidden group">

    <!-- Lueur subtile en fond pour donner un aspect premium 3D -->
    <div
        class="absolute -top-32 -right-32 w-64 h-64 bg-copper-500/10 rounded-full blur-[80px] pointer-events-none group-hover:bg-copper-500/20 transition-all duration-700">
    </div>

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center relative z-10 gap-6">

        <!-- SECTION GAUCHE : Identité de l'asset -->
        <div class="flex items-center gap-5 md:gap-6">

            <!-- Logo Container -->
            <div class="relative w-24 h-24 flex items-center justify-center shrink-0">
                <!-- Halo de lumière -->
                <div
                    class="absolute inset-0 rounded-full bg-copper-500/15 blur-md group-hover:bg-copper-400/30 transition-all duration-500">
                </div>
                <!-- On suppose que asset="hype" par exemple pour le src -->
                <img src="assets/logos/{{asset || 'placeholder'}}.png" alt="Logo"
                    class="relative z-10 w-full h-full object-contain filter drop-shadow-[0_0_8px_rgba(255,255,255,0.15)]">
            </div>

            <!-- Noms & Tag -->
            <div class="flex flex-col">
                <div class="flex flex-wrap items-center gap-3">
                    <h1 class="text-3xl md:text-5xl font-black text-white tracking-widest uppercase drop-shadow-md">
                        {{asset || 'NOM ASSET'}}
                    </h1>
                    <!-- Tag / Type -->
                    <span
                        class="px-3 py-1 text-xs font-bold tracking-widest uppercase rounded-full bg-copper-600/20 text-copper-300 border border-copper-500/40 shadow-inner">
                        CRYPTO
                    </span>
                </div>
                <!-- Symbole -->
                <span
                    class="text-copper-400 font-bold tracking-[0.2em] mt-2 text-lg drop-shadow-sm uppercase">{{symbol}}</span>
            </div>

        </div>

        <!-- SECTION DROITE : Prix & Données -->
        <div
            class="flex flex-col md:items-end items-start border-t md:border-t-0 md:border-l border-copper-500/20 pt-6 md:pt-0 pl-0 md:pl-10 w-full md:w-auto">

            <!-- Prix et Variation -->
            <div class="flex flex-wrap md:flex-nowrap items-baseline gap-3 md:gap-4 md:justify-end w-full">
                <span
                    class="text-4xl md:text-5xl font-black bg-gradient-to-r from-copper-300 to-copper-500 text-transparent bg-clip-text drop-shadow-[0_0_10px_rgba(184,115,51,0.2)]">
                    {{actualPrice}}$
                </span>

                <!-- Variation 24h -->
                <span
                    class="flex items-center text-sm font-bold {{ change24h > 0 ? 'text-green-400 bg-green-400/10 border-green-400/20' : 'text-red-400 bg-red-400/10 border-red-400/20' }}  px-2 py-1 rounded-lg border shadow-sm shrink-0">
                    <!-- Flèche dynamique (Haut ou Bas) -->
                    @if (change24h > 0) {
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                    </svg>
                    } @else {
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"></path>
                    </svg>
                    }
                    {{change24h > 0 ? '+' : ''}}{{change24h | number : '1.2-2'}}%
                </span>
            </div>

            <!-- Stats Secondaires : Volume & Mise à jour -->
            <div
                class="mt-4 flex flex-wrap md:flex-row items-start md:items-center gap-3 text-xs font-medium text-copper-400/70 tracking-wider w-full md:justify-end">

                <!-- Market Cap -->
                <div
                    class="flex items-center bg-dark-900/60 px-3 py-1.5 rounded-lg border border-copper-500/20 shadow-inner shrink-0 border-l-2 border-l-copper-500">
                    <span class="opacity-70 mr-2 uppercase text-[10px]">Cap:</span>
                    <span
                        class="text-white font-bold tracking-widest drop-shadow-sm">{{formatNumber(marketCap)}}$</span>
                </div>

                <!-- Volume 24h -->
                <div
                    class="flex items-center bg-dark-900/60 px-3 py-1.5 rounded-lg border border-copper-500/20 shadow-inner shrink-0">
                    <span class="opacity-70 mr-2 uppercase text-[10px]">Vol 24h:</span>
                    <span
                        class="text-white font-bold tracking-widest drop-shadow-sm">{{formatNumber(volume24h)}}$</span>
                </div>

                <!-- Dernière mise à jour -->
                <div
                    class="flex items-center bg-dark-900/40 px-3 py-1.5 rounded-lg border border-copper-500/10 hidden xl:flex shrink-0">
                    <svg class="w-3.5 h-3.5 mr-1.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    MàJ: {{formatTime(lastRefresh)}}
                </div>

            </div>

        </div>

    </div>
</div>
