<!-- Lien pour la page de l'asset intégré dans la card qui est un bouton -->
<a [routerLink]="link()"
    class="group relative w-60 flex flex-col items-center p-6 rounded-2xl bg-dark-800/40 backdrop-blur-md border border-copper-500/20 shadow-lg shadow-black/50 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_10px_30px_rgba(184,115,51,0.2)] hover:border-copper-500/50 overflow-hidden">

    <!-- Lueur au survol -->
    <div
        class="absolute inset-0 bg-gradient-to-b from-transparent to-copper-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none">
    </div>

    <!-- Logo -->
    <div
        class="relative w-16 h-16 flex items-center justify-center mb-2 transform transition-transform duration-500 group-hover:scale-110 group-hover:-translate-y-1 z-10">
        <!-- Effet de halo cuivré autour du logo -->
        <div
            class="absolute inset-0 rounded-full bg-copper-500/20 blur-md group-hover:bg-copper-500/40 transition-all duration-300">
        </div>
        <img [src]="logo()" alt="Logo de {{asset()}}"
            class="relative z-10 w-full h-full object-contain filter drop-shadow-[0_0_4px_rgba(255,255,255,0.1)]">
    </div>

    <!-- Nom -->
    <h3 class="text-lg font-bold text-white tracking-widest uppercase mb-1 z-10 drop-shadow-sm">
        {{title()}}
    </h3>

    <!-- Ligne de séparation -->
    <div
        class="w-8 h-[2px] bg-copper-500/40 rounded-full mb-3 z-10 transition-all duration-300 group-hover:w-16 group-hover:bg-copper-400">
    </div>

    <!-- Prix -->
    <p
        class="text-2xl font-black bg-gradient-to-r from-copper-300 to-copper-500 text-transparent bg-clip-text drop-shadow-sm z-10">
        @if (price() !== null) {
            {{ price() | number:'1.2-2' }} {{currencySymbol()}}
        } @else {
            -
        }
    </p>

    <!-- Variation -->
    @if (price() !== null) {
        <span class="text-xs font-bold mt-2 px-3 py-1 rounded-full z-10 tracking-widest border"
            [class.text-green-400]="change() >= 0" 
            [class.bg-green-400/10]="change() >= 0"
            [class.border-green-400/20]="change() >= 0"
            [class.text-red-400]="change() < 0" 
            [class.bg-red-400/10]="change() < 0"
            [class.border-red-400/20]="change() < 0">
            {{ change() >= 0 ? '+' : '' }}{{ change() | number:'1.2-2' }}%
        </span>
    }

</a>
