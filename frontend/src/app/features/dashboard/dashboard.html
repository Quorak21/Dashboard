<div class="relative z-10 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col flex-grow gap-16">

    <!-- Header Section -->
    <div class="flex flex-col items-center text-center gap-4">
        <h1
            class="text-5xl font-black tracking-tighter bg-gradient-to-r from-copper-300 via-copper-500 to-copper-300 text-transparent bg-clip-text drop-shadow-sm uppercase">
            Market Overview
        </h1>
    </div>

    <div class="flex flex-col gap-12">
        <!-- Category: Crypto -->
        <section class="flex flex-col gap-8">
            <div class="flex items-center gap-4">
                <div
                    class="w-10 h-10 rounded-xl bg-copper-500/10 border border-copper-500/20 flex items-center justify-center">
                    <svg class="w-5 h-5 text-copper-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-amber-100 tracking-widest uppercase">
                    Cryptocurrencies
                </h2>
                <div class="h-[1px] flex-grow bg-gradient-to-r from-copper-500/30 to-transparent"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <app-asset-dashboard-card asset="hype" title="Hype" [price]="hypePrice()" [change]="hypeChange()"
                    currencySymbol="$"></app-asset-dashboard-card>
            </div>
        </section>

        <!-- Category: Stocks -->
        <section class="flex flex-col gap-8">
            <div class="flex items-center gap-4">
                <div
                    class="w-10 h-10 rounded-xl bg-copper-500/10 border border-copper-500/20 flex items-center justify-center">
                    <svg class="w-5 h-5 text-copper-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-amber-100 tracking-widest uppercase">
                    Stocks
                </h2>
                <div class="h-[1px] flex-grow bg-gradient-to-r from-copper-500/30 to-transparent"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <app-asset-dashboard-card asset="inveb" title="Investor AB" [price]="invebPrice()" [change]="invebChange()"
                    currencySymbol="SEK"></app-asset-dashboard-card>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Category: ETFs -->
            <section class="flex flex-col gap-8 opacity-40 grayscale transition-all duration-500 hover:opacity-60">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center">
                        <svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold text-white/60 tracking-widest uppercase">
                        ETFs
                    </h2>
                    <span
                        class="text-[10px] bg-white/10 text-white/40 px-2 py-0.5 rounded border border-white/10 font-bold tracking-tighter">COMING
                        SOON</span>
                </div>
            </section>

            <!-- Category: Commodities -->
            <section class="flex flex-col gap-8 opacity-40 grayscale transition-all duration-500 hover:opacity-60">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center">
                        <svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 15.546c.053.164.082.341.082.527 0 1.105-.895 2-2 2H5c-1.105 0-2-.895-2-2 0-.186.029-.363.082-.527L5.584 7.313a1 1 0 01.954-.684h10.924a1 1 0 01.954.684l2.584 8.233z" />
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold text-white/60 tracking-widest uppercase">
                        Commodities
                    </h2>
                    <span
                        class="text-[10px] bg-white/10 text-white/40 px-2 py-0.5 rounded border border-white/10 font-bold tracking-tighter">COMING
                        SOON</span>
                </div>
            </section>
        </div>
    </div>

</div>
