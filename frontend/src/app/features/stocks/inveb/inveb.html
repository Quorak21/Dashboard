<div
  class="relative z-10 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col flex-grow gap-8"
>
  <!-- Carte titre -->
  <div class="flex flex-wrap gap-8 justify-center">
    <app-asset-main-card
      asset="Investor AB"
      [symbol]="symbol()"
      [actualPrice]="currentPrice()"
      [change24h]="priceChangePercentage24h()"
      [volume24h]="totalVolume()"
      [marketCap]="marketCap()"
      [lastRefresh]="lastRefresh()"
      [currencySymbol]="currencySymbol()"
      tag="stock"
      [marketClosed]="isMarketClosed()"
    >
    </app-asset-main-card>
  </div>

  <!-- Charts Section -->
  <div class="flex flex-col md:flex-row gap-4 w-full">
    <!-- Chart annuelle -->
    <div class="flex flex-col w-full md:w-3/5">
      <h3 class="text-copper-400 text-lg font-medium mb-4 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span>
        Annual Performance
      </h3>
      <app-price-chart
        [prices]="historyPrices()"
        [labels]="historyDays()"
        currency="SEK"
      ></app-price-chart>
    </div>
    <!-- Daily Chart -->
    <div class="flex flex-col w-full md:w-2/5">
      <h3 class="text-copper-400 text-lg font-medium mb-4 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span>
        Daily Live
      </h3>
      <app-daily-chart
        [prices]="livePrices()"
        [labels]="liveDays()"
        currency="SEK"
      ></app-daily-chart>
    </div>
  </div>

  <!-- Dividend & Fundamentals -->
  <div class="flex flex-col md:flex-row gap-4 w-full items-stretch">
    <app-inveb-dividend-card class="w-full md:w-1/2" [currentPrice]="currentPrice()" />
    <app-inveb-fundamentals-card class="w-full md:w-1/2" />
  </div>
</div>
