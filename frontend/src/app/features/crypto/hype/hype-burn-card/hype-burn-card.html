<div
    class="relative w-full h-full min-h-[280px] bg-dark-800/60 rounded-3xl border border-orange-500/30 shadow-2xl shadow-black overflow-hidden group hover:border-orange-500/60 transition-all duration-700 flex flex-col p-6">

    <!-- Background Image (Plus visible) -->
    <div
        class="absolute inset-0 bg-[url('/assets/images/burn.png')] bg-cover bg-center group-hover:scale-110 transition-all duration-1000">
    </div>

    <!-- Dark Gradient Overlay for readability -->
    <div class="absolute inset-0 bg-gradient-to-t from-dark-900/90 via-dark-900/60 to-dark-800/40 pointer-events-none">
    </div>

    <!-- Header -->
    <div class="flex justify-center relative z-10">
        <h3 class="text-orange-400 text-xl font-black uppercase tracking-[0.2em] drop-shadow-md flex items-center">
            <!-- Flame Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor"
                class="h-8 w-8 mr-2 text-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,1)] animate-pulse">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" />
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 18a3.75 3.75 0 0 0 .495-7.468 5.99 5.99 0 0 0-1.925 3.547 5.975 5.975 0 0 1-2.133-1.001A3.75 3.75 0 0 0 12 18Z"
                    fill="#fb923c" />
            </svg>
            Last 24h
        </h3>
    </div>

    <!-- Gauge Section -->
    <div class="relative z-10 flex-grow flex items-center justify-center mt-6">
        <div class="relative w-full max-w-[350px] aspect-[4/3]">
            <!-- Semi-Circle SVG -->
            <svg viewBox="0 0 110 40" class="w-full h-full drop-shadow-2xl overflow-visible">
                <!-- Background Track -->
                <path d="M 10 50 A 35 50 0 0 1 100 50" fill="none" stroke="currentColor" stroke-width="12"
                    stroke-linecap="round" class="text-orange-950/60" />

                <!-- Foreground Gauge (Dynamic) -->
                <path d="M 10 50 A 35 50 0 0 1 100 50" fill="none" stroke="url(#flameGradient)" stroke-width="12"
                    stroke-linecap="round"
                    class="drop-shadow-[0_0_15px_rgba(249,115,22,0.8)] transition-all duration-1000 ease-out"
                    [style.stroke-dasharray]="dashArrayStyle()" />

                <!-- Gradient Definition -->
                <defs>
                    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ef4444" /> <!-- Red -->
                        <stop offset="50%" stop-color="#f97316" /> <!-- Orange -->
                        <stop offset="100%" stop-color="#eab308" /> <!-- Yellow -->
                    </linearGradient>
                </defs>
            </svg>

            <!-- Burned 24h Text Inside Gauge -->
            <div class="absolute inset-0 flex flex-col items-center justify-end pb-0">
                <span
                    class="text-4xl font-mono font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-orange-400 to-yellow-400 drop-shadow-[0_0_20px_rgba(249,115,22,0.5)]">
                    {{ formatNumber(burned24h()) }}
                </span>
                <!-- Valeur USD secondaire -->
                <span class="text-orange-200/50 text-sm font-medium mt-[-4px] mb-1">
                    ≈ {{ burnedValueUsd() }}$
                </span>
                <span class="text-orange-200/70 text-[11px] font-bold tracking-[0.2em] uppercase mt-2">
                    Tokens Destroyed
                </span>
                <span class="text-orange-200/40 text-[9px] font-medium tracking-wider mt-1">
                    Total: <span class="text-orange-500/80 font-bold">{{ hypeBurned100() | number:'1.0-2'}}%</span>
                </span>
            </div>
        </div>
    </div>

</div>
