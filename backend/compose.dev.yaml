services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=dokkcorp_db'
      - 'POSTGRES_USER=${POSTGRES_USER:-dokkadmin}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-localdev}'
    ports:
      - '5432:5432'
    volumes:
      - dokkcorp_pgdata:/var/lib/postgresql/data

volumes:
  dokkcorp_pgdata:
