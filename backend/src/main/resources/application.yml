server:
  port: 8080

spring:
  web:
    error:
      include-message: always
  application:
    name: dokkcorp-dashboard # Nom global

  docker:
    compose:
      enabled: true
      file: compose.yaml 
      lifecycle-management: start_and_stop

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

app:
  coingecko:
    api-key: "${COINGECKO_API_KEY:}"
    base-url: "https://api.coingecko.com/api/v3"