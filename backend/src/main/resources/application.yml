server:
  port: 8080

spring:
  config:
    import: optional:classpath:config/assets-registry.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  web:
    error:
      include-message: always
  application:
    name: dokkcorp-dashboard

  datasource:
    url: jdbc:postgresql://localhost:5432/dokkcorp_db
    username: ${POSTGRES_USER:dokkadmin}
    password: ${POSTGRES_PASSWORD:localdev}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  http:
    connect-timeout-ms: ${HTTP_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${HTTP_READ_TIMEOUT_MS:5000}
    retry:
      max-attempts: ${HTTP_RETRY_MAX_ATTEMPTS:3}
      backoff-ms: ${HTTP_RETRY_BACKOFF_MS:300}
  coingecko:
    api-key: "${COINGECKO_API_KEY:}"
    base-url: "https://api.coingecko.com/api/v3"
  blockchain:
    rpc-url: "${BLOCKCHAIN_RPC_URL:}"
    connect-timeout-ms: ${RPC_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${RPC_READ_TIMEOUT_MS:5000}
  fmp:
    api-key: "${FMP_API_KEY:}"
    base-url: "https://financialmodelingprep.com/stable"
  cors:
    allowed-origins: "${CORS_ORIGINS:http://localhost:4200,https://dashboard-six-pink-56.vercel.app,https://dashboard.dokkcorp.ch}"
  alerts:
    fundamentals-stale-days: 90
