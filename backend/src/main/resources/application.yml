server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  web:
    error:
      include-message: always
  application:
    name: dokkcorp-dashboard

  jpa:
    hibernate:
      ddl-auto: update

app:
  coingecko:
    api-key: "${COINGECKO_API_KEY:}"
    base-url: "https://api.coingecko.com/api/v3"
  blockchain:
    rpc-url: "${BLOCKCHAIN_RPC_URL:https://hyperliquid-mainnet.g.alchemy.com/v2/2GJ2xHyFi8xCaBv0sUHPj}"
  cors:
    allowed-origins: "${CORS_ORIGINS:http://localhost:4200,https://dashboard-six-pink-56.vercel.app,https://dashboard.dokkcorp.ch}"