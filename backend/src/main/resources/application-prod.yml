spring:
  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://postgres:5432/dokkcorp_db
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate


  web:
    error:
      include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health


